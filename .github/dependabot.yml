version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    labels:
      - "dependencies"

updates:
  - package-ecosystem: "bun"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    cooldown:
      default-days: 3
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "bun"
    directory: "/backend"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    cooldown:
      default-days: 3

  - package-ecosystem: "uv"
    directory: "/backend"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    cooldown:
      default-days: 3
    allow:
      - dependency-type: "all"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    cooldown:
      default-days: 3

  - package-ecosystem: "docker"
    directory: "/backend"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    cooldown:
      default-days: 3
