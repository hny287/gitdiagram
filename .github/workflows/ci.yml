name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun ci
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Frontend tests
        run: bun run test
      - name: Build
        run: bun run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install backend JS dependencies
        run: cd backend && bun ci
      - name: Install uv
        run: pip install uv==0.11.2
      - name: Sync backend dependencies
        run: cd backend && uv sync --frozen --no-install-project
      - name: Import sanity
        run: cd backend && uv run python -m compileall app
      - name: Backend tests
        run: cd backend && uv run pytest -q
